  <style>
    /* Initial HTML shimmer (before Flutter bootstraps) */
    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .skeleton {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 16px 28px;
    }

    .sk-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .sk-spacer {
      flex: 1;
    }

    .sk {
      position: relative;
      overflow: hidden;
      background: #eef0f4;
      border-radius: 12px;
    }

    .sk::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(
        110deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.75) 45%,
        rgba(255,255,255,0) 80%
      );
      animation: shimmer 1.25s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .sk::before { animation: none; }
    }

    /* Layout blocks */
    .sk-appbar {
      height: 56px;
      border-radius: 16px;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 10px 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
      margin-bottom: 14px;
    }

    .sk-pill { border-radius: 999px; }
    .sk-icon { width: 36px; height: 36px; border-radius: 12px; }
    .sk-search { height: 36px; width: min(560px, 65vw); }

    .sk-banner {
      height: 240px;
      border-radius: 20px;
      margin: 14px 0 18px;
    }

    .sk-cats {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .sk-cat {
      height: 78px;
      border-radius: 16px;
    }

    .sk-section-title {
      height: 16px;
      width: 180px;
      border-radius: 8px;
      margin: 10px 0 12px;
    }

    .sk-products {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .sk-product {
      height: 190px;
      border-radius: 18px;
    }

    @media (max-width: 900px) {
      .sk-cats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .sk-products { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .sk-banner { height: 200px; }
    }

    @media (max-width: 520px) {
      .skeleton { padding: 14px 12px 22px; }
      .sk-cats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .sk-banner { height: 170px; border-radius: 16px; }
      .sk-product { height: 170px; border-radius: 16px; }
      .sk-appbar { height: 52px; border-radius: 14px; }
      .sk-search { width: 58vw; }
    }
  </style>

<script>

</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      // navigator.serviceWorker.register("/flutter_service_worker.js");
      navigator.serviceWorker.register("/firebase-messaging-sw.js");

</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js" defer></script>


<script>
  window.addEventListener('load', function(ev) {
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      serviceWorker: {
        serviceWorkerVersion: {{flutter_service_worker_version}},
      },
      onEntrypointLoaded: function(engineInitializer) {
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        var config = { renderer: isMobile ? 'html' : 'canvaskit' };
        engineInitializer.initializeEngine(config).then(function(appRunner) {
          appRunner.runApp();
          // Hide initial HTML loader shortly after Flutter attaches
          setTimeout(function () {
            var loader = document.getElementById('app-loader');
            if (loader) {
              loader.style.opacity = '0';
              loader.style.transition = 'opacity 0.25s ease-out';
              setTimeout(function() {
                loader.parentNode && loader.parentNode.removeChild(loader);
              }, 260);
            }
          }, 400);
        });
      }
    });
  });
</script>
