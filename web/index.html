  <style>
    /* Initial HTML shimmer (before Flutter bootstraps) */
    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .skeleton {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 16px 28px;
    }

    .sk-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .sk-spacer {
      flex: 1;
    }

    .sk {
      position: relative;
      overflow: hidden;
      background: #eef0f4;
      border-radius: 12px;
    }

    .sk::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(
        110deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.75) 45%,
        rgba(255,255,255,0) 80%
      );
      animation: shimmer 1.25s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .sk::before { animation: none; }
    }

    /* Layout blocks */
    .sk-appbar {
      height: 56px;
      border-radius: 16px;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 10px 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
      margin-bottom: 14px;
    }

    .sk-pill { border-radius: 999px; }
    .sk-icon { width: 36px; height: 36px; border-radius: 12px; }
    .sk-search { height: 36px; width: min(560px, 65vw); }

    .sk-banner {
      height: 240px;
      border-radius: 20px;
      margin: 14px 0 18px;
    }

    .sk-cats {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .sk-cat {
      height: 78px;
      border-radius: 16px;
    }

    .sk-section-title {
      height: 16px;
      width: 180px;
      border-radius: 8px;
      margin: 10px 0 12px;
    }

    .sk-products {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .sk-product {
      height: 190px;
      border-radius: 18px;
    }

    @media (max-width: 900px) {
      .sk-cats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .sk-products { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .sk-banner { height: 200px; }
    }

    @media (max-width: 520px) {
      .skeleton { padding: 14px 12px 22px; }
      .sk-cats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .sk-banner { height: 170px; border-radius: 16px; }
      .sk-product { height: 170px; border-radius: 16px; }
      .sk-appbar { height: 52px; border-radius: 14px; }
      .sk-search { width: 58vw; }
    }

<script>
  // Check if localStorage is supported in the browser
  if (typeof Storage !== "undefined") {
    var itemValue = localStorage.getItem("flutter.theme");
    document.body.classList.toggle("theme-dark", itemValue === "true");
  }
</script>

<script>
  // When true: do not register firebase-messaging-sw.js (display-only web; mirrors Dart FeatureFlags.disableFirebaseAndPushOnWeb).
  var DISABLE_FIREBASE_WEB_PUSH = true;
  // Defer FCM worker so it does not compete with Flutter / main bundle on first load.
  function registerFirebaseMessagingSwDeferred() {
    if (DISABLE_FIREBASE_WEB_PUSH) return;
    if (!("serviceWorker" in navigator)) return;
    var run = function () {
      navigator.serviceWorker.register("/firebase-messaging-sw.js").catch(function () {});
    };
    if ("requestIdleCallback" in window) {
      requestIdleCallback(run, { timeout: 8000 });
    } else {
      setTimeout(run, 2500);
    }
  }
  registerFirebaseMessagingSwDeferred();
</script>

<script>
  // Start Flutter on DOMContentLoaded instead of window.load so deferred third-party
  // scripts do not block the first frame (Firebase is initialized from Dart; SW loads its own SDK).
  function startFlutterApp() {
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      serviceWorker: {
        serviceWorkerVersion: {{flutter_service_worker_version}},
      },
      onEntrypointLoaded: function(engineInitializer) {
        // Renderer tradeoff (Flutter web):
        // - html: DOM + Canvas 2D. Smaller initial download, faster time-to-interactive on phones
        //   and narrow layouts; some widgets/shaders may look slightly different vs mobile apps.
        // - canvaskit: Skia compiled to WASM. Heavier first load (~MB-scale) but text, clips, and
        //   visual parity are closer to Flutter on iOS/Android — best default for desktop monitors.
        //
        // We use html on small viewports / typical mobile UAs, and canvaskit on wide desktop.
        var chosenRenderer = 'canvaskit';
        (function () {
          var ua = navigator.userAgent || '';
          var mobileUa = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
          // iPadOS 13+ may report as Mac; treat touch Mac as tablet → prefer lighter html renderer.
          var touchMacTablet = navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1;
          var narrow = window.innerWidth < 768;
          var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
          var preferHtml = mobileUa || touchMacTablet || narrow || (coarse && window.innerWidth < 1024);
          chosenRenderer = preferHtml ? 'html' : 'canvaskit';
        })();
        var config = { renderer: chosenRenderer };
        engineInitializer.initializeEngine(config).then(function(appRunner) {
          appRunner.runApp();
          setTimeout(function () {
            var loader = document.getElementById('app-loader');
            if (loader) {
              loader.style.opacity = '0';
              loader.style.transition = 'opacity 0.25s ease-out';
              setTimeout(function() {
                loader.parentNode && loader.parentNode.removeChild(loader);
              }, 260);
            }
          }, 80);
        });
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startFlutterApp);
  } else {
    startFlutterApp();
  }
</script>
