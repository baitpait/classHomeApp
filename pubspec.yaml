name: hexacom_user
description: A new Flutter restaurant application.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get_it: ^8.2.0
  http: ^1.5.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  dio: ^5.9.0
  image_picker: ^1.2.0
  pin_code_fields: ^8.0.1
  shimmer_animation: ^2.2.2
  url_launcher: ^6.3.2
  url_launcher_web: ^2.4.1
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^19.4.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.5
  photo_view: ^0.15.0
  carousel_slider: ^5.1.1
  universal_html: ^2.2.4
  flutter_widget_from_html_core: ^0.17.0
  country_code_picker: ^3.4.0
  flutter_typeahead: ^5.2.0
  intl: any
  flutter_inappwebview: ^6.1.5
  audioplayers: ^6.5.0
  flutter_facebook_auth: ^7.1.2
  google_sign_in: ^7.1.1
  simple_speed_dial: ^0.1.7
  cached_network_image: ^3.4.1
  dotted_border: ^3.1.0
  flutter_svg: ^2.2.0
  flutter_xlider: ^3.5.0
  firebase_auth: ^6.0.1
  flutter_staggered_grid_view: ^0.7.0
  phone_numbers_parser: ^9.0.11
  go_router: ^16.2.0
  url_strategy: ^0.3.0
  dropdown_button2: ^2.3.9
  palette_generator: ^0.3.3
  sign_in_with_apple: ^7.0.1
  drift: ^2.28.1
  drift_flutter: ^0.2.5
  syncfusion_flutter_datepicker: ^30.2.7

dependency_overrides:
  flutter_inappwebview_ios:
    git:
      url: https://github.com/andychucs/flutter_inappwebview
      ref: master
      path: flutter_inappwebview_ios

dev_dependencies:
  flutter_lints: ^5.0.0
  drift_dev: ^2.19.0
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter


flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/image/
    - assets/svg/
    - assets/language/
    - assets/

  fonts:
    - family: Exo
      fonts:
        - asset: assets/fonts/Exo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Exo-Medium.ttf
          weight: 600
        - asset: assets/fonts/Exo-SemiBold.ttf
          weight: 500
        - asset: assets/fonts/Exo-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700