# مثال لموقع Nginx — انسخ الملفات من build/web إلى جذر الموقع (مثلاً /var/www/anagheem)
# مهم لـ go_router: إعادة توجيه المسارات إلى index.html

server {
    listen 80;
    server_name your-domain.com;
    root /var/www/anagheem;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # كاش خفيف للأصول الثابتة (اختياري)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
